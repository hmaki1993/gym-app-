  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      // Clear Service Workers and Caches to force update from APK assets
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          for(let r of regs) r.unregister();
        });
      }
      if (window.caches) {
        caches.keys().then(names => {
          for (let n of names) caches.delete(n);
        });
      }
    </script>
    <title>Power Grid — Elite Training System</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/Green_Illustrative_Gym___Fitness_Logo__1_-removebg-preview.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/Green_Illustrative_Gym___Fitness_Logo__1_-removebg-preview.png" />
    <meta name="apple-mobile-web-app-title" content="PowerGrid" />
    <meta name="description" content="Track your gym workouts, sets, weights, and personal records. Offline-first training tracker." />
    <style>
      html, body {
        overscroll-behavior: none !important;
        overscroll-behavior-x: none !important;
        overscroll-behavior-y: none !important;
        touch-action: pan-y;
      }
    </style>
  </head>

  </body>
</html>
